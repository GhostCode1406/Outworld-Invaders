<div class="auth-container">
  <div class="auth-card">
    <h1>{{ mode() === 'login' ? 'Connexion' : 'Inscription' }}</h1>

    <div class="form">
      <input
        type="text"
        placeholder="Nom d'utilisateur"
        [(ngModel)]="username"
        [disabled]="isLoading()"
      />

      <input
        type="password"
        placeholder="Mot de passe"
        [(ngModel)]="password"
        [disabled]="isLoading()"
        (keyup.enter)="submit()"
      />

      @if (errorMessage()) {
        <div class="error">{{ errorMessage() }}</div>
      }

      <button (click)="submit()" [disabled]="isLoading()">
        {{ isLoading() ? '...' : (mode() === 'login' ? 'Se connecter' : "S'inscrire") }}
      </button>

      <p class="toggle">
        {{ mode() === 'login' ? "Pas de compte ?" : 'Déjà un compte ?' }}
        <a (click)="toggleMode()">{{ mode() === 'login' ? "S'inscrire" : 'Se connecter' }}</a>
      </p>
    </div>
  </div>
</div>
