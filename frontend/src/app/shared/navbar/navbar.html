<nav class="navbar">
  <div class="brand">🗼 Last Stand</div>
  <ul class="nav-links">
    <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Accueil</a></li>
    <li><a routerLink="/game" routerLinkActive="active">Jouer</a></li>
    <li><a routerLink="/leaderboard" routerLinkActive="active">Leaderboard</a></li>

    @if (isLoggedIn()) {
      <li class="user-info">👤 {{ currentUser()?.username }}</li>
      <li><a (click)="logout()" class="logout-btn">Déconnexion</a></li>
    } @else {
      <li><a routerLink="/login" routerLinkActive="active">Connexion</a></li>
    }
  </ul>
</nav>
